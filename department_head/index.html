<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NASC-EDC Department Home Page</title>
    <!-- custom css file -->
    <link rel="stylesheet" href="./assets/css/style.css">
    <!-- font awesome cdn -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css" />

</head>
<body>
    <header class="header">
        <nav class="navbar">
           <div class="logo">
               <a href="">
                   <p>NASC <span>EDC</span></p>
                   <small>Department head</small>
               </a>
           </div>
           <form action="" class="search-form">
              <div class="form-controller">
                <input type="text" name="search" id="search" placeholder="Search..">
                <input type="button" id="search-btn" value="Search">
              </div>
           </form>
           <button class="toggle-btn">
                <i class="fas fa-bars"></i>
           </button>
            <ul>
                <li class="profile-btn"><a href="javascript:void(0)"><img src="./assets/images/nasc-image.jpg" alt="profile"></a></li>
            </ul>
        </nav>
    </header>
    <div class="profile-menu">
        <ul>
            <li><a href=""><i class="fas fa-user-cog"></i> setting</a></li>
            <li><a href=""><i class="fas fa-sign-out-alt"></i> logout </a></li>
        </ul>
    </div>
    <!-- left box start -->
    <section class="left-box">
        <ul>
            <li class="active"><a href="./index.html"><i class="fas fa-tachometer-alt"></i> <span>Dashboard</span></a></li>
            <li><a href="./student.html"><i class="fas fa-users"></i> <span>students</span></a></li>
            <li><a href="#"><i class="fas fa-building"></i> <span>Department</span></a></li>
            <li><a href="#"><i class="fas fa-user-graduate"></i> <span>courses</span></a></li>
            <li><a href="#"><i class="fas fa-cog"></i> <span>settings</span></a></li>
            <li><a href="#"><i class="fas fa-sign-out-alt"></i> <span>logout</span></a></li>
            
        </ul>
    </section>
    <!-- left box end -->
    <!-- right box start -->
    <section class="right-box">

        <div class="card">
            <div class="icon">
                <i class="fas fa-users fa-5x"></i>   
            </div>
            <div class="content">
                <small>Registerd Students</small>
                <h3>200</h3>
            </div>
        </div>

        <div class="card">
            <div class="icon">
                <i class="fas fa-building fa-5x"></i>
            </div>
            <div class="content">
                <small>total Departments</small>
                <h3>200</h3>
            </div>
        </div>

        <div class="card">
            <div class="icon">
                <i class="fas fa-user-graduate fa-5x"></i>
            </div>
            <div class="content">
                <small>total courses</small>
                <h3>2000000</h3>
            </div>
        </div>

        
    </section>
    <!-- right box end -->

    <!-- footer section start -->
    <footer class="footer">
        <p>copyright &copy; <span class="footer-date"></span>| All rights reserved</p>
    </footer>

    <!-- footer section end -->


    <script src="./assets/js/custom.js"></script>
