<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nehru Arts And Science College - EDC</title>
    <!-- custom css file -->
    <link rel="stylesheet" href="./assets/css/style.css">
    <!-- font awesome cdn -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css" />

</head>

<body>
    <!-- navbar section start -->
    <header class="header">
        <nav class="navbar">
            <a href="./index.html" class="logo">NASC <span>EDC</span></a>
            <button id="btn-toggler">
                <i class="fas fa-bars"></i>
            </button>
            <ul>
                <li><a href="./index.html">Home</a></li>
                <li><a target="_blank" href="https://www.nehrucolleges.net/all-courses.php">Courses</a></li>
                <li><a target="_blank" href="https://www.nehrucolleges.net/">Department</a></li>
                <li><a target="_blank" href="https://www.nehrucolleges.net/">NASC</a></li>
                <li id="dashboard"><a href="./dashboard.html">Dashboard</a></li>

            </ul>
            <div class="dashboard-btn">
                <a class="btn-main" href="">Dashboard</a>
            </div>
        </nav>

    </header>
    <!-- navbar section end -->
    <!-- form section start -->
    <section class="login-form active">
        <div class="form-container">
            <h3>Log In</h3>
            <form>
                <div class="form-controller">
                    <label for="registerNo">Register No.</label>
                    <input type="text" required id="registerNo" placeholder="Enter Your Register No." value="">
                </div>
                <div class="form-controller">
                    <label for="password">PIN</label>
                    <input type="password" required id="password" placeholder="Enter Your Pin" value="">
                </div>
               
                <input type="button" class="login-btn" id="login-btn" value="Get In">
                <p>Not registered?<a href="./index.html"> register here</a></p>
            </form>
        </div>
    </section>
    <!-- form section end -->

    <!-- user details section start -->
    <section class="user-details">
        <div class="form-container">
            <h3>Profile</h3>
            <form>
                <div class="form-controller">
                    <label>Register No.</label>
                    <input type="text" id="registerNo" value="">
                </div>
                <div class="form-controller">
                    <label>Name</label>
                    <input type="text" id="name" value="">
                </div>
                <div class="form-controller">
                    <label>email</label>
                    <input type="text" id="email" value="">
                </div>
                <div class="form-controller">
                    <label>mobile</label>
                    <input type="text" id="mobile"  value="">
                </div>
                <div class="form-controller">
                    <label>Department</label>
                    <input type="text" id="department" value="">
                </div>
                <div class="form-controller">
                    <label>Course</label>
                    <input type="text" id="course" value="">
                </div>
               <a href="./dashboard.html" class="btn-logout">Log out</a>
            </form>
        </div>
    </section>
    <!-- user details section end -->

    <footer>
        <p>copyright &copy; <span id="footerDate"></span>| All Rights Reserved</p>
    </footer>

    <!-- custom js file -->
    <script src="./assets/js/custom.js"></script>
    <script>
            // dashboard form section start
                const loginForm = document.querySelector('.login-form');
                const userDetails = document.querySelector('.user-details');

                document.querySelector('#login-btn').addEventListener('click', () => {
                    loginForm.classList.remove('active');
                    userDetails.classList.add('active');
                });
            
    </script>
</body>

</html>
